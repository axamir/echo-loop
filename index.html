<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Echo-Loop — Living Archive</title>

<meta name="description" content="Echo-Loop is a living bilingual timeline of human-AI dialogues exploring time, consciousness, causality and free will.">
<meta name="theme-color" content="#0a0f1f"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a0f1f;
  --panel:rgba(255,255,255,0.05);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#8b5cf6;
  --accent2:#22d3ee;
  --border:rgba(255,255,255,0.08);
}

[data-theme="light"]{
  --bg:#f8fafc;
  --panel:#ffffff;
  --text:#0f172a;
  --muted:#475569;
  --border:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,Vazirmatn,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* Layout */
.app{
  display:grid;
  grid-template-columns:260px 1fr;
  min-height:100vh;
}

/* Sidebar */
.sidebar{
  border-right:1px solid var(--border);
  padding:20px;
  position:sticky;
  top:0;
  height:100vh;
  backdrop-filter: blur(20px);
}

.brand{
  font-weight:800;
  font-size:20px;
  background:linear-gradient(45deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  color:transparent;
  margin-bottom:20px;
}

.nav button{
  width:100%;
  padding:10px;
  margin:6px 0;
  background:transparent;
  border:1px solid var(--border);
  color:var(--text);
  border-radius:10px;
  cursor:pointer;
  text-align:left;
}

.nav button:hover{
  border-color:var(--accent);
}

/* Main */
.main{
  padding:30px;
}

.hero{
  padding:40px;
  border:1px solid var(--border);
  border-radius:20px;
  background:linear-gradient(135deg,rgba(139,92,246,0.1),rgba(34,211,238,0.05));
}

h1{
  font-size:42px;
  font-weight:800;
}

.sub{
  color:var(--muted);
  margin-top:10px;
}

/* Timeline */
.timeline{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.card{
  padding:18px;
  border:1px solid var(--border);
  border-radius:14px;
  background:var(--panel);
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:var(--accent);
}

.tag{
  font-size:12px;
  color:var(--accent);
}

/* topbar */
.topbar{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:transparent;
  cursor:pointer;
}

/* mobile */
@media(max-width:900px){
  .app{grid-template-columns:1fr}
  .sidebar{display:none}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="brand">Echo-Loop</div>

  <div class="nav">
    <button onclick="setView('timeline')">🧭 Timeline</button>
    <button onclick="setView('topics')">🧠 Topics</button>
    <button onclick="setView('about')">📘 About</button>
    <button onclick="toggleLang()">🌐 Language</button>
    <button onclick="toggleTheme()">🌓 Theme</button>
  </div>

  <p style="margin-top:20px;color:var(--muted);font-size:12px">
    Living archive of human ↔ AI cognition loops.
  </p>
</div>

<!-- MAIN -->
<div class="main">

<div class="topbar">
  <div id="modeTitle">Timeline</div>
  <div>
    <button class="btn" onclick="refresh()">↻ Refresh</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1 id="title">Echo-Loop</h1>
  <div class="sub" id="subtitle">
    A living bilingual timeline of human–AI echoes across time, consciousness and causality.
  </div>
</div>

<!-- CONTENT -->
<div id="content" class="timeline"></div>

</div>
</div>

<script>

let lang = localStorage.getItem("lang") || "en";
let theme = localStorage.getItem("theme") || "dark";
document.documentElement.setAttribute("data-theme", theme);

const data = [
  {id:1, title_en:"Time is not linear", title_fa:"زمان خطی نیست", tag:"time", desc_en:"A loop discussion about temporal causality.", desc_fa:"بحثی درباره علیت و زمان غیرخطی"},
  {id:2, title_en:"Free Will Feedback", title_fa:"بازخورد اراده آزاد", tag:"consciousness", desc_en:"Will emerges as system feedback.", desc_fa:"اراده آزاد به عنوان بازخورد سیستم"},
  {id:3, title_en:"Quantum Echo Theory", title_fa:"نظریه پژواک کوانتومی", tag:"quantum", desc_en:"Entangled dialogue states across agents.", desc_fa:"درهم‌تنیدگی گفتگو میان ایجنت‌ها"}
];

function render(){
  const c = document.getElementById("content");
  c.innerHTML = "";

  data.forEach(x=>{
    const title = lang==="en"?x.title_en:x.title_fa;
    const desc = lang==="en"?x.desc_en:x.desc_fa;

    c.innerHTML += `
      <div class="card">
        <div class="tag">${x.tag}</div>
        <h3>${title}</h3>
        <p style="color:var(--muted);margin-top:6px">${desc}</p>
      </div>
    `;
  });
}

function toggleLang(){
  lang = lang==="en"?"fa":"en";
  localStorage.setItem("lang",lang);
  document.body.dir = lang==="fa"?"rtl":"ltr";
  render();
}

function toggleTheme(){
  theme = theme==="dark"?"light":"dark";
  localStorage.setItem("theme",theme);
  document.documentElement.setAttribute("data-theme",theme);
}

function setView(v){
  document.getElementById("modeTitle").innerText = v;
}

function refresh(){
  render();
}

document.body.dir = lang==="fa"?"rtl":"ltr";
render();

</script>

</body>
</html>
