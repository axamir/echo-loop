<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Echo-Loop | Living Archive</title>

<meta name="description" content="Echo-Loop is a living bilingual archive of human-AI dialogues exploring time, consciousness, causality and self-reference." />
<meta name="author" content="Amir Ahmadi" />
<meta name="theme-color" content="#0a0f1f" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>
:root{
  --bg:#070a12;
  --card:rgba(255,255,255,0.06);
  --text:#e7ecff;
  --muted:#aab3d6;
  --accent:#8b5cf6;
  --line:rgba(255,255,255,0.08);
}

[data-theme="light"]{
  --bg:#f7f8fc;
  --card:rgba(0,0,0,0.04);
  --text:#0b1020;
  --muted:#445;
  --line:rgba(0,0,0,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:Inter,Vazirmatn,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* Canvas */
#bg{
  position:fixed;inset:0;
  z-index:-1;
}

/* Layout */
.container{max-width:1200px;margin:auto;padding:24px}

nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 0;
}

.logo{
  font-weight:800;
  letter-spacing:1px;
  background:linear-gradient(90deg,#8b5cf6,#ec4899);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  background:var(--card);
  border:1px solid var(--line);
  color:var(--text);
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  transition:.2s;
}
.btn:hover{transform:translateY(-2px);border-color:var(--accent)}

.hero{
  padding:80px 0;
}

h1{
  font-size:clamp(40px,6vw,80px);
  line-height:1.1;
}

.subtitle{
  margin-top:16px;
  color:var(--muted);
  max-width:700px;
}

/* grid */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:16px;
  margin-top:40px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:18px;
  border-radius:18px;
  transition:.25s;
}
.card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
}

.tag{
  display:inline-block;
  margin-top:10px;
  font-size:12px;
  opacity:.7;
}

/* footer */
footer{
  margin-top:80px;
  padding:30px 0;
  border-top:1px solid var(--line);
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<nav>
  <div class="logo">ECHO-LOOP</div>
  <div>
    <button class="btn" onclick="toggleLang()">🌐</button>
    <button class="btn" onclick="toggleTheme()">🌓</button>
  </div>
</nav>

<section class="hero">
  <h1 id="title">Echo-Loop</h1>
  <p class="subtitle" id="subtitle">
    A living bilingual archive of dialogues between human and machine exploring time, memory and self-reference.
  </p>
</section>

<section>
  <div class="grid" id="guide"></div>
</section>

<section>
  <h2 id="echoTitle">Echoes</h2>
  <div class="grid" id="echoes"></div>
</section>

<footer>
  <div>© 2026 Amir Ahmadi — CC0</div>
  <div style="margin-top:10px">
    GitHub • IPFS • Archive
  </div>
</footer>

</div>

<script>
// ===== STATE =====
let lang = localStorage.getItem("lang") || "en";
let theme = localStorage.getItem("theme") || "dark";

// ===== THEME =====
document.documentElement.setAttribute("data-theme", theme);
function toggleTheme(){
  theme = theme === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
}

// ===== LANGUAGE =====
function toggleLang(){
  lang = lang === "en" ? "fa" : "en";
  localStorage.setItem("lang", lang);
  render();
}

// ===== CONTENT =====
const guide = {
  en:[
    ["Research Layer","Uses manifest.json + IPFS archive"],
    ["Human Layer","Read reflections & dialogues"],
    ["Machine Layer","Structured schema + metadata"]
  ],
  fa:[
    ["لایه پژوهش","استفاده از manifest و IPFS"],
    ["لایه انسان","خواندن گفتگوها و تأملات"],
    ["لایه ماشین","داده ساخت‌یافته و متادیتا"]
  ]
};

const echoes = [
  {
    title:"First Echo",
    fa:"نخستین پژواک",
    desc:"Time, entanglement, causality loop",
    tag:"time"
  }
];

// ===== RENDER =====
function render(){
  document.getElementById("title").innerText =
    lang==="en" ? "Echo-Loop" : "حلقه پژواک";

  document.getElementById("subtitle").innerText =
    lang==="en"
    ? "A living archive of human-AI consciousness dialogues."
    : "آرشیو زنده گفتگوهای آگاهی انسان و ماشین.";

  document.getElementById("echoTitle").innerText =
    lang==="en" ? "Echoes" : "پژواک‌ها";

  // guide
  const g = document.getElementById("guide");
  g.innerHTML = "";
  guide[lang].forEach(i=>{
    g.innerHTML += `
      <div class="card">
        <b>${i[0]}</b>
        <div class="tag">${i[1]}</div>
      </div>
    `;
  });

  // echoes
  const e = document.getElementById("echoes");
  e.innerHTML = "";
  echoes.forEach(x=>{
    e.innerHTML += `
      <div class="card">
        <b>${lang==="en"?x.title:x.fa}</b>
        <div class="tag">${x.desc}</div>
      </div>
    `;
  });
}
render();

// ===== THREE.JS LIGHT LOOP =====
const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;c.height=innerHeight;

let t=0;
function animate(){
  ctx.clearRect(0,0,c.width,c.height);
  for(let i=0;i<8;i++){
    let r=100+i*40;
    ctx.beginPath();
    ctx.arc(c.width/2,c.height/2,r+Math.sin(t+i)*20,0,Math.PI*2);
    ctx.strokeStyle="rgba(139,92,246,0.15)";
    ctx.stroke();
  }
  t+=0.01;
  requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
