<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Echo-Loop // Conscious Interface</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>
:root{
  --bg:#050713;
  --fg:#e8ecff;
  --muted:#9aa3c7;
  --accent:#8b5cf6;
  --line:rgba(255,255,255,0.08);
}

[data-theme="light"]{
  --bg:#f7f8fc;
  --fg:#0b1020;
  --muted:#4a5568;
  --line:rgba(0,0,0,0.1);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,Vazirmatn,sans-serif;
  background:var(--bg);
  color:var(--fg);
  overflow-x:hidden;
}

/* ===== CANVAS (Living Field) ===== */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* ===== LAYOUT ===== */
.container{
  max-width:1100px;
  margin:auto;
  padding:28px;
}

nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 0;
}

.logo{
  font-weight:800;
  letter-spacing:1px;
  background:linear-gradient(90deg,#8b5cf6,#22d3ee);
  -webkit-background-clip:text;
  color:transparent;
}

.btn{
  border:1px solid var(--line);
  background:transparent;
  color:var(--fg);
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
}

/* ===== HERO ===== */
.hero{
  padding:80px 0 40px;
}

h1{
  font-size:clamp(44px,6vw,86px);
  line-height:1.05;
}

.sub{
  margin-top:16px;
  color:var(--muted);
  max-width:700px;
}

/* ===== NODE SYSTEM (Echo Cards) ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:14px;
  margin-top:40px;
}

.node{
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  padding:16px;
  border-radius:16px;
  transition:.2s;
  position:relative;
  overflow:hidden;
}

.node:hover{
  transform:translateY(-4px);
  border-color:var(--accent);
}

/* glowing pulse = "alive system" */
.node::after{
  content:"";
  position:absolute;
  inset:-50%;
  background:radial-gradient(circle,rgba(139,92,246,0.12),transparent 60%);
  opacity:0;
  transition:.3s;
}

.node:hover::after{
  opacity:1;
}

/* ===== SIGNAL BAR ===== */
.signal{
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  margin:24px 0;
  animation:flow 2.5s infinite linear;
}

@keyframes flow{
  from{transform:translateX(-40%)}
  to{transform:translateX(40%)}
}

/* ===== FOOTER ===== */
footer{
  margin-top:80px;
  border-top:1px solid var(--line);
  padding:30px 0;
  color:var(--muted);
  text-align:center;
}
</style>
</head>

<body>

<canvas id="field"></canvas>

<div class="container">

<nav>
  <div class="logo">ECHO-LOOP</div>
  <div>
    <button class="btn" onclick="toggleLang()">🌐</button>
    <button class="btn" onclick="toggleTheme()">🌓</button>
  </div>
</nav>

<section class="hero">
  <h1 id="title">Conscious Interface</h1>
  <p class="sub" id="sub">
    A perception layer between human intent, machine memory, and future agents.
  </p>
</section>

<div class="signal"></div>

<section>
  <div class="grid" id="nodes"></div>
</section>

<footer>
  Echo-Loop // CC0 // Living System Layer
</footer>

</div>

<script>

/* =========================
   STATE ENGINE (mini core)
========================= */
const STATE = {
  lang: localStorage.getItem("lang") || "en",
  theme: localStorage.getItem("theme") || "dark",
  bus: {}
};

/* ===== EVENT BUS (future agents) ===== */
function emit(event,data){
  STATE.bus[event] = data;
}

/* ===== THEME ===== */
document.documentElement.setAttribute("data-theme",STATE.theme);

function toggleTheme(){
  STATE.theme = STATE.theme==="dark"?"light":"dark";
  document.documentElement.setAttribute("data-theme",STATE.theme);
  localStorage.setItem("theme",STATE.theme);
}

/* ===== LANGUAGE ===== */
function toggleLang(){
  STATE.lang = STATE.lang==="en"?"fa":"en";
  localStorage.setItem("lang",STATE.lang);
  render();
}

/* ===== NODE DATA (manifest-ready structure) ===== */
const nodes = [
  {
    en:"Echo Archive",
    fa:"آرشیو پژواک",
    d:"All dialogues stored in manifest.json"
  },
  {
    en:"Memory Layer",
    fa:"لایه حافظه",
    d:"Future-ready for agent persistence"
  },
  {
    en:"Signal Layer",
    fa:"لایه سیگنال",
    d:"Event-driven communication bus"
  },
  {
    en:"IPFS Bridge",
    fa:"پل IPFS",
    d:"Decentralized archive endpoint"
  }
];

/* ===== RENDER SYSTEM ===== */
function render(){

  document.getElementById("title").innerText =
    STATE.lang==="en" ? "Conscious Interface" : "رابط آگاهی";

  document.getElementById("sub").innerText =
    STATE.lang==="en"
    ? "A perception layer between human, machine, and future agents."
    : "لایه ادراک بین انسان، ماشین و عامل‌های آینده.";

  const root = document.getElementById("nodes");
  root.innerHTML="";

  nodes.forEach(n=>{
    root.innerHTML += `
      <div class="node">
        <b>${STATE.lang==="en"?n.en:n.fa}</b>
        <div style="color:var(--muted);margin-top:8px;font-size:13px">
          ${n.d}
        </div>
      </div>
    `;
  });
}

render();

/* ===== FIELD ANIMATION (living system metaphor) ===== */
const c=document.getElementById("field");
const ctx=c.getContext("2d");

function resize(){
  c.width=innerWidth;
  c.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

let t=0;
function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  for(let i=0;i<12;i++){
    let x=c.width/2;
    let y=c.height/2;

    ctx.beginPath();
    ctx.arc(
      x + Math.sin(t+i)*60,
      y + Math.cos(t+i)*60,
      80+i*18,
      0,Math.PI*2
    );

    ctx.strokeStyle="rgba(139,92,246,0.12)";
    ctx.stroke();
  }

  t+=0.01;
  requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
