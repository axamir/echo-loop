<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Echo-Loop | Living Cognitive System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>
:root{
  --bg:#05060c;
  --panel:rgba(255,255,255,.05);
  --text:#e5e7eb;
  --muted:#94a3b8;
  --accent:#8b5cf6;
  --life:#22c55e;
  --death:#ef4444;
  --line:rgba(255,255,255,.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Inter,Vazirmatn,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* ===== BACKGROUND (BREATHING FIELD) ===== */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* ===== LIVING LAYER ===== */
.ui{
  display:grid;
  grid-template-columns:300px 1fr;
  height:100vh;
}

/* SIDEBAR (ORGANISM MEMORY) */
.sidebar{
  border-right:1px solid var(--line);
  padding:16px;
  backdrop-filter:blur(20px);
}

.echoItem{
  padding:10px;
  margin-bottom:10px;
  border:1px solid var(--line);
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
  background:var(--panel);
  position:relative;
}

.echoItem::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
  background:var(--life);
  opacity:.4;
}

.echoItem:hover{
  transform:translateX(5px);
}

/* MAIN ORGANISM FIELD */
.main{
  position:relative;
  overflow:hidden;
}

.header{
  padding:20px;
}

.title{
  font-size:2rem;
  font-weight:900;
  background:linear-gradient(90deg,var(--accent),var(--life));
  -webkit-background-clip:text;
  color:transparent;
}

/* LIVING GRAPH FIELD */
.field{
  position:relative;
  height:100%;
}

.node{
  position:absolute;
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--life);
  box-shadow:0 0 20px var(--life);
  cursor:pointer;
  animation:pulse 3s infinite ease-in-out;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.8}
  50%{transform:scale(1.4);opacity:1}
  100%{transform:scale(1);opacity:.8}
}

.link{
  position:absolute;
  height:1px;
  background:rgba(34,197,94,.25);
  transform-origin:left center;
}

/* LIFE STATE INDICATORS */
.lifebar{
  height:4px;
  background:var(--life);
  margin-top:6px;
  border-radius:10px;
  opacity:.6;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="ui">

  <!-- MEMORY ORGANISM -->
  <div class="sidebar">
    <h3>Living Echo Organism</h3>
    <div id="list"></div>
  </div>

  <!-- FIELD -->
  <div class="main">
    <div class="header">
      <div class="title">Echo-Loop / Living System</div>
      <div style="color:var(--muted)">
        Each Echo is a living node with growth, decay, and memory resonance.
      </div>
    </div>

    <div class="field" id="field"></div>
  </div>

</div>

<script>

/* =========================
   LIVING MEMORY MODEL
========================= */

const echoes = [
  {
    id:"seed",
    title:"Seed Memory",
    energy:0.8,
    age:0,
    x:200,
    y:200,
    links:["birth"]
  },
  {
    id:"birth",
    title:"Birth of Thought",
    energy:1,
    age:0,
    x:400,
    y:260,
    links:["mutation"]
  },
  {
    id:"mutation",
    title:"Mutated Understanding",
    energy:0.6,
    age:0,
    x:300,
    y:420,
    links:[]
  }
];

/* =========================
   LIFE ENGINE (DECAY + GROWTH)
========================= */

function updateLife(){
  echoes.forEach(e=>{
    e.age += 0.01;

    // energy decay or stabilization
    e.energy = Math.max(0.2, e.energy - 0.001);

    // slight drift (organic movement)
    e.x += Math.sin(e.age)*0.2;
    e.y += Math.cos(e.age)*0.2;
  });
}

/* =========================
   RENDER ORGANISM LIST
========================= */

const list=document.getElementById("list");

function renderList(){
  list.innerHTML="";
  echoes.forEach(e=>{
    const div=document.createElement("div");
    div.className="echoItem";
    div.innerHTML=`
      <div>${e.title}</div>
      <div class="lifebar" style="width:${e.energy*100}%"></div>
    `;
    div.onclick=()=>alert("Entering living node: "+e.title);
    list.appendChild(div);
  });
}

/* =========================
   FIELD RENDER
========================= */

const field=document.getElementById("field");

function renderField(){
  field.innerHTML="";

  // links
  echoes.forEach(e=>{
    e.links.forEach(l=>{
      const t=echoes.find(x=>x.id===l);
      if(!t) return;

      const dx=t.x-e.x;
      const dy=t.y-e.y;
      const len=Math.sqrt(dx*dx+dy*dy);

      const link=document.createElement("div");
      link.className="link";
      link.style.left=e.x+"px";
      link.style.top=e.y+"px";
      link.style.width=len+"px";
      link.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;

      field.appendChild(link);
    });
  });

  // nodes
  echoes.forEach(e=>{
    const node=document.createElement("div");
    node.className="node";
    node.style.left=e.x+"px";
    node.style.top=e.y+"px";

    node.style.opacity = 0.3 + e.energy;

    node.onclick=()=>alert("Memory Pulse: "+e.title);

    field.appendChild(node);
  });
}

/* =========================
   BACKGROUND BREATHING FIELD
========================= */

const c=document.getElementById("bg");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let t=0;

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  for(let i=0;i<80;i++){
    let x=c.width/2 + Math.sin(t+i*0.1)*200;
    let y=c.height/2 + Math.cos(t+i*0.1)*200;

    ctx.fillStyle="rgba(34,197,94,0.15)";
    ctx.beginPath();
    ctx.arc(x,y,2,0,Math.PI*2);
    ctx.fill();
  }

  t+=0.01;
  requestAnimationFrame(draw);
}

/* =========================
   LIFE LOOP
========================= */

function loop(){
  updateLife();
  renderList();
  renderField();
  requestAnimationFrame(loop);
}

draw();
loop();

</script>

</body>
</html>
