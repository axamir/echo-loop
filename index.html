<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Echo-Loop | Autonomous Archive System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#05070b;
--text:#eef2ff;
--muted:#9aa4b2;
--accent:#8b5cf6;
--accent2:#22d3ee;
--line:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Inter','Vazirmatn',sans-serif;
background:radial-gradient(circle at top,#0f1a33,transparent 65%),var(--bg);
color:var(--text);
overflow:hidden;
}

/* CANVAS LAYERS */
canvas{
position:fixed;
inset:0;
}

#bg{z-index:-3}
#graph{z-index:-2}
#signal{z-index:-1;opacity:0.08}

/* UI */
.ui{
position:relative;
z-index:10;
width:min(1200px,92%);
margin:auto;
padding-top:60px;
}

.title{
font-size:clamp(3rem,7vw,6rem);
line-height:0.95;
font-weight:900;
letter-spacing:-0.05em;
}

.title span{
background:linear-gradient(135deg,var(--accent),var(--accent2));
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
margin-top:16px;
color:var(--muted);
max-width:700px;
line-height:1.9;
}

/* NODE GRID */
.grid{
margin-top:60px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
}

.node{
border:1px solid var(--line);
padding:18px;
border-radius:16px;
cursor:pointer;
transition:.25s;
position:relative;
overflow:hidden;
}

.node:hover{
border-color:var(--accent);
transform:translateY(-4px);
}

.energy{
position:absolute;
top:10px;
right:12px;
font-size:.75rem;
color:var(--accent2);
}

/* STATE BAR */
.state{
position:fixed;
top:16px;
right:16px;
border:1px solid var(--line);
padding:10px 14px;
border-radius:999px;
backdrop-filter:blur(10px);
font-size:.8rem;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
display:none;
place-items:center;
background:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
}

.modal-content{
width:min(700px,92%);
padding:24px;
border:1px solid var(--line);
border-radius:16px;
background:rgba(10,15,25,0.95);
}

</style>
</head>

<body>

<canvas id="bg"></canvas>
<canvas id="graph"></canvas>
<canvas id="signal"></canvas>

<div class="state" id="state">SYSTEM: IDLE</div>

<div class="ui">

<div class="title">
Echo-Loop<br><span>Autonomous Archive</span>
</div>

<div class="subtitle" id="subtitle">
The archive now reacts. Nodes evolve based on attention, interaction, and time exposure.
</div>

<div class="grid" id="grid"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content">
<h2 id="mTitle"></h2>
<p id="mText" style="margin-top:12px;color:#9aa4b2;line-height:1.8;"></p>
</div>
</div>

<script>

/* =========================
AUTONOMOUS MEMORY AGENT CORE
========================= */

let nodes=Array.from({length:12},(_,i)=>({
id:i,
title:["Time Loop","Witness Model","Quantum Signal","Recursive Identity","Entropy Drift","Memory Collapse","Causal Echo","Observer Field","Temporal Fold","Signal Loss","Reconstruction","Drift Memory"][i],
desc:"This node evolves based on interaction pressure and recursive attention feedback.",
energy:Math.random()*0.6+0.2,
attention:0
}));

let state="idle";

/* RENDER UI NODES */
function render(){
const g=document.getElementById("grid");
g.innerHTML="";

nodes.forEach(n=>{

n.energy+=Math.random()*0.02-0.01;
n.energy=Math.max(0.1,Math.min(1,n.energy));

g.innerHTML+=`
<div class="node" onclick="openNode(${n.id})"
onmouseenter="attend(${n.id})">

<div class="energy">⚡ ${n.energy.toFixed(2)}</div>
<div style="font-weight:700">${n.title}</div>
<div style="margin-top:10px;color:#9aa4b2;font-size:.9rem">
${n.desc}
</div>

</div>
`;
});

requestAnimationFrame(render);
}

render();

/* ATTENTION ENGINE */
function attend(id){
state="reacting";
document.getElementById("state").innerText="SYSTEM: REACTING";

nodes[id].attention+=0.2;
nodes[id].energy+=0.05;

/* ripple effect */
nodes.forEach(n=>{
if(n.id!==id){
n.energy-=0.01;
}
});
}

/* MODAL */
function openNode(id){
document.getElementById("modal").style.display="grid";
document.getElementById("mTitle").innerText=nodes[id].title;
document.getElementById("mText").innerText=
nodes[id].desc + "\n\nAttention Level: " + nodes[id].attention.toFixed(2);
}

/* BACKGROUND SIGNAL FIELD */
const bg=document.getElementById("bg");
const gctx=bg.getContext("2d");

bg.width=innerWidth;
bg.height=innerHeight;

let pts=Array.from({length:90},()=>({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
}));

function draw(){

gctx.clearRect(0,0,bg.width,bg.height);

for(let p of pts){

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>innerWidth)p.vx*=-1;
if(p.y<0||p.y>innerHeight)p.vy*=-1;

gctx.fillStyle="rgba(139,92,246,0.5)";
gctx.fillRect(p.x,p.y,2,2);

for(let q of pts){

let dx=p.x-q.x;
let dy=p.y-q.y;
let d=Math.sqrt(dx*dx+dy*dy);

if(d<110){
gctx.strokeStyle="rgba(139,92,246,0.07)";
gctx.beginPath();
gctx.moveTo(p.x,p.y);
gctx.lineTo(q.x,q.y);
gctx.stroke();
}
}
}

requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
