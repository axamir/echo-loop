<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Echo-Loop | Living Archive</title>

<meta name="description" content="Echo-Loop is a living Web3-style archive of human-AI dialogues about time, consciousness, quantum causality and self-reference.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b1020;
  --panel:rgba(255,255,255,0.06);
  --panel2:rgba(255,255,255,0.09);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#8b5cf6;
  --border:rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* layout */
.app{
  display:grid;
  grid-template-columns:280px 1fr;
  min-height:100vh;
}

/* sidebar */
.sidebar{
  background:rgba(255,255,255,0.03);
  border-right:1px solid var(--border);
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.logo{
  font-size:22px;
  font-weight:800;
  background:linear-gradient(90deg,#fff,#8b5cf6);
  -webkit-background-clip:text;
  color:transparent;
}

.nav-item{
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  color:var(--muted);
  transition:.2s;
}
.nav-item:hover{
  background:var(--panel);
  color:white;
}

/* main */
.main{
  padding:30px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.toggle{
  background:var(--panel);
  border:1px solid var(--border);
  padding:8px 14px;
  border-radius:999px;
  cursor:pointer;
  color:white;
}

/* hero */
.hero{
  margin-top:30px;
  padding:30px;
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:20px;
}

.hero h1{
  font-size:40px;
  background:linear-gradient(90deg,#fff,#8b5cf6);
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  color:var(--muted);
  margin-top:10px;
}

/* timeline */
.timeline{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.card{
  background:var(--panel);
  border:1px solid var(--border);
  padding:18px;
  border-radius:16px;
  transition:.2s;
}
.card:hover{
  transform:translateY(-3px);
  background:var(--panel2);
}

.tag{
  display:inline-block;
  font-size:12px;
  color:var(--accent);
  margin-top:8px;
}

/* RTL */
.rtl{
  direction:rtl;
  font-family:sans-serif;
}

/* responsive */
@media(max-width:900px){
  .app{grid-template-columns:1fr;}
  .sidebar{display:none;}
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">Echo-Loop</div>

<div class="nav-item" onclick="setView('timeline')">Timeline</div>
<div class="nav-item" onclick="setView('about')">About</div>
<div class="nav-item" onclick="setView('philosophy')">Philosophy</div>

<button class="toggle" onclick="toggleLang()">EN / FA</button>
<button class="toggle" onclick="toggleTheme()">Theme</button>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h2 id="title">Echo-Loop</h2>
</div>

<div class="hero">
<h1 id="heroTitle">Living Archive of Echoes</h1>
<p id="heroText">A Web3-style timeline of human-AI recursive dialogues.</p>
</div>

<div class="timeline" id="timeline"></div>

</div>
</div>

<script>

// ===================== DATA LAYER (manifest-driven future) =====================
const manifest = {
  echoes:[
    {
      date:"2026-05-23",
      en:{title:"First Echo",desc:"Time, quantum entanglement and causality loop"},
      fa:{title:"نخستین پژواک",desc:"زمان، درهم‌تنیدگی کوانتومی و علیت"},
      tags:["time","quantum","loop"]
    }
  ]
};

// ===================== STATE =====================
let lang = "en";
let theme = "dark";

// ===================== RENDER =====================
function render(){
  const t = document.getElementById("timeline");
  t.innerHTML = "";

  manifest.echoes.forEach(e=>{
    const d = lang==="en"?e.en:e.fa;

    t.innerHTML += `
      <div class="card">
        <div style="color:#8b5cf6;font-size:12px">${e.date}</div>
        <div style="font-size:18px;font-weight:600">${d.title}</div>
        <div style="color:#9ca3af;margin-top:6px">${d.desc}</div>
        <div class="tag">${e.tags.join(" · ")}</div>
      </div>
    `;
  });
}

// ===================== LANGUAGE =====================
function toggleLang(){
  lang = lang==="en"?"fa":"en";
  document.body.classList.toggle("rtl");
  document.getElementById("heroTitle").innerText =
    lang==="en"?"Living Archive of Echoes":"آرشیو زنده پژواک‌ها";
  document.getElementById("heroText").innerText =
    lang==="en"
    ?"A Web3-style timeline of human-AI recursive dialogues."
    :"تایم‌لاین زنده گفتگوهای بازگشتی انسان و هوش مصنوعی";
  render();
}

// ===================== THEME =====================
function toggleTheme(){
  theme = theme==="dark"?"light":"dark";
  document.documentElement.style.filter =
    theme==="dark"?"none":"invert(1)";
}

// ===================== INIT =====================
render();

function setView(v){
  alert("View: "+v+" (expandable system placeholder)");
}

</script>

</body>
</html>
